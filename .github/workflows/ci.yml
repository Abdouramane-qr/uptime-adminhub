name: AdminHub CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Backend client wiring tests
        run: npm run test:backend-client

      - name: Strict backend guard
        run: npm run qa:strict-backend

      - name: Strict backend build
        run: npm run build:strict-backend

      - name: Backend link full gate
        run: npm run qa:backend-link:full

      - name: Coverage
        run: npm run test:coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: qa_reports/coverage
          if-no-files-found: warn
